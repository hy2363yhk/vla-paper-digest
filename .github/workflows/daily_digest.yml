name: Daily VLA Paper Digest

on:
  schedule:
    # UTC 01:00 == Asia/Shanghai 09:00
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      force_bootstrap:
        description: "Force a full bulk bootstrap (ignore local paper_db.json)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          WECHAT_PUSHPLUS_TOKEN: ${{ secrets.WECHAT_PUSHPLUS_TOKEN }}
          WECHAT_PUSHPLUS_TOPIC: ${{ secrets.WECHAT_PUSHPLUS_TOPIC }}
          VLA_TOP_RANKED_COUNT: ${{ vars.VLA_TOP_RANKED_COUNT || '4' }}
          VLA_TOP_RANKED_MIN_SCORE: ${{ vars.VLA_TOP_RANKED_MIN_SCORE || '2.0' }}
          VLA_MAX_PER_LAB: ${{ vars.VLA_MAX_PER_LAB || '2' }}
        run: |
          if [ "${{ github.event.inputs.force_bootstrap }}" = "true" ]; then
            python -m src.main --force-bootstrap
          else
            python -m src.main
          fi

      - name: Upload failed digest artifact (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failed-digest-${{ github.run_id }}
          path: data/failed_digest_*.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit updated data
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/paper_db.json data/history.json data/classic_rotation_state.json data/classic_papers.json || true
          if git diff --cached --quiet; then
            echo "no data changes to commit"
          else
            git commit -m "chore(data): daily digest $(date -u +%F)"
            git push
          fi
