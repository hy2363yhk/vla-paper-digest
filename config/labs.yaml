# Curated lab / lab-PI anchors for the paper-discovery step.
# Adapted from paper_pulse/config.yaml, trimmed to the VLA + LLM-foundation
# subset most relevant to the user's PhD direction, and extended with
# VLA-specific academic labs (IRIS/BAIR/RAIL/Physical Intelligence/NVIDIA GEAR).
#
# Schema per lab:
#   arxiv_au       - collective / author names used when they sign arXiv submissions
#   title_keywords - brand names to match in title (e.g. "Kimi", "π0")
#   watchlist_ids  - hard-coded arXiv IDs we want to force-pull (metadata has no org hint)
#   weight         - lab-boost multiplier (1.0 default; see src/scoring.py)
#   tier           - 1 (tier-1 flagship) | 2 (tier-2) — display-only tag

