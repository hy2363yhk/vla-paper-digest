# ── affiliation fallback (all-field arXiv search) ─────────────────────
# Used when author metadata doesn't include an org name but the abstract
# or comments mention the affiliation.
affiliation_terms:
  - "DeepSeek"
  - "NVIDIA Research"
  - "NVIDIA"
  - "Google DeepMind"
  - "DeepMind"
  - "Google Research"
  - "Meta AI"
  - "FAIR"
  - "Microsoft Research"
  - "OpenAI"
  - "Anthropic"
  - "Physical Intelligence"
  - "Apple MLR"
  - "Shanghai AI Laboratory"
  - "Shanghai AI Lab"
  - "Tsinghua University"
  - "Peking University"
  - "Stanford University"
  - "UC Berkeley"
  - "Carnegie Mellon"
  - "Massachusetts Institute of Technology"
  - "MIT CSAIL"
  - "ETH Zurich"
  - "University of Washington"
  - "Princeton University"


# ── arXiv category coverage (expanded from just cs.RO) ────────────────
# cs.RO catches classic robotics; cs.LG / cs.CV / cs.AI catch NVIDIA / DeepSeek
# / Meta foundation-model papers that never get cross-listed to cs.RO.
arxiv_categories:
  - cs.RO
  - cs.LG
  - cs.AI
  - cs.CV
  - cs.CL


# ── Per-run limits ─────────────────────────────────────────────────────
arxiv_max_results_per_query: 300        # was 200, now 300 per branch
arxiv_lookback_days: 90
arxiv_institution_lookback_days: 30     # lab-targeted searches stay tighter
arxiv_watchlist_lookback_days: 365


# ── Notable researchers (highlight-only, not an extra search) ─────────
# Papers authored by these people get an additional display "notable author" tag
# and a small +0.5 boost via src/scoring.py. Keep it focused; too many names
# dilutes the signal.
notable_authors:
  - "Yann LeCun"
  - "Geoffrey Hinton"
  - "Yoshua Bengio"
  - "Andrej Karpathy"
  - "Fei-Fei Li"
  - "Li Fei-Fei"
