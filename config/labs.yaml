  - "Jim Fan"
  - "Ted Xiao"
  - "Shuran Song"
  - "Jiajun Wu"
  - "Dorsa Sadigh"
  - "Huazhe Xu"
  - "Jitendra Malik"
  - "Percy Liang"
  - "Russ Tedrake"
  - "Pulkit Agrawal"
  - "Jun Zhu"


# ── Lab boost ──────────────────────────────────────────────────────────
# Rule: if any of a paper's authors appear in a lab's ``arxiv_au`` list,
# or the paper's title matches a lab's ``title_keywords``, we add
# ``lab_boost_base * lab.weight`` to the composite score.
# Default 2.0 means tier-1 lab (weight=1.0) gets +2.0 / 10.0 composite boost
# — enough to lift a mid-score arXiv preprint above generic high-cite papers,
# but not enough to dominate when relevance is near zero.
lab_boost_base: 2.0
notable_author_boost: 0.5
